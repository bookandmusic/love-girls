name: Build Client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            SEMVER=$VERSION
            echo "Tag triggered, version: $VERSION"
          else
            LAST_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$LAST_TAG" ]; then
              BASE_VERSION=${LAST_TAG#v}
              BUILD_NUM=$(git rev-list --count "${LAST_TAG}..HEAD" 2>/dev/null || echo "0")
              BUILD_NUM=$((BUILD_NUM % 65536))
              VERSION="${BASE_VERSION}.${BUILD_NUM}"
              SEMVER="${BASE_VERSION}+${BUILD_NUM}"
              echo "Manual trigger with last semver tag $LAST_TAG, version: $VERSION, semver: $SEMVER (commits since tag: $BUILD_NUM)"
            else
              BUILD_NUM=$(git rev-list --count HEAD 2>/dev/null || echo "1")
              BUILD_NUM=$((BUILD_NUM % 65536))
              VERSION="1.0.0.${BUILD_NUM}"
              SEMVER="1.0.0+${BUILD_NUM}"
              echo "Manual trigger without tag, version: $VERSION, semver: $SEMVER"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT

  build-desktop:
    needs: get-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - platform: windows
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - platform: macos
            target: universal-apple-darwin
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/client/src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Update version
        shell: bash
        run: |
          SEMVER=${{ needs.get-version.outputs.semver }}
          echo "Setting version to $SEMVER"
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" frontend/client/src-tauri/tauri.conf.json
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" frontend/client/src-tauri/tauri.conf.json
          fi
          cat frontend/client/src-tauri/tauri.conf.json | grep version

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.platform == 'macos' && '--target universal-apple-darwin' || format('--target {0}', matrix.target) }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-bundles
          path: frontend/client/src-tauri/target/${{ matrix.target }}/release/bundle

  build-android:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android,x86_64-unknown-linux-gnu

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/client/src-tauri/target
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Setup Android NDK
        run: echo "ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | sort -V | tail -n 1)" >> $GITHUB_ENV

      - name: Restore Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/lovegirl.keystore

      - name: Update version
        run: |
          SEMVER=${{ needs.get-version.outputs.semver }}
          echo "Setting version to $SEMVER"
          sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" frontend/client/src-tauri/tauri.conf.json
          cat frontend/client/src-tauri/tauri.conf.json | grep version

      - name: Initialize Android
        working-directory: frontend
        run: pnpm --filter client tauri android init || true

      - name: Copy Android icons
        run: |
          SRC_DIR="frontend/client/src-tauri/icons/android"
          DEST_DIR="frontend/client/src-tauri/gen/android/app/src/main/res"
          
          if [ -d "$SRC_DIR" ]; then
            for dir in "$SRC_DIR"/mipmap-*; do
              dirname=$(basename "$dir")
              mkdir -p "$DEST_DIR/$dirname"
              cp -r "$dir"/* "$DEST_DIR/$dirname/"
            done
            if [ -d "$SRC_DIR/values" ]; then
              mkdir -p "$DEST_DIR/values"
              cp -r "$SRC_DIR/values"/* "$DEST_DIR/values/"
            fi
            echo "Android icons copied successfully"
            ls -laR "$DEST_DIR"/mipmap-* | head -30
          else
            echo "Source icon directory not found: $SRC_DIR"
          fi

      - name: Configure Android network security
        run: |
          ANDROID_DIR="frontend/client/src-tauri/gen/android/app/src/main"
          mkdir -p "$ANDROID_DIR/res/xml"
          
          cat > "$ANDROID_DIR/res/xml/network_security_config.xml" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          
          MANIFEST="$ANDROID_DIR/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            python3 << 'PYTHON'
          import xml.etree.ElementTree as ET

          ET.register_namespace('android', 'http://schemas.android.com/apk/res/android')
          tree = ET.parse('frontend/client/src-tauri/gen/android/app/src/main/AndroidManifest.xml')
          root = tree.getroot()
          
          manifest_ns = {'android': 'http://schemas.android.com/apk/res/android'}
          
          existing_perms = root.findall(".//uses-permission[@android:name='android.permission.INTERNET']", manifest_ns)
          if not existing_perms:
              perm = ET.Element('uses-permission')
              perm.set('{http://schemas.android.com/apk/res/android}name', 'android.permission.INTERNET')
              root.insert(0, perm)
          
          app = root.find('application')
          if app is not None:
              if '{http://schemas.android.com/apk/res/android}networkSecurityConfig' not in app.attrib:
                  app.set('{http://schemas.android.com/apk/res/android}networkSecurityConfig', '@xml/network_security_config')
          
          tree.write('frontend/client/src-tauri/gen/android/app/src/main/AndroidManifest.xml', encoding='utf-8', xml_declaration=True)
          PYTHON
            echo "AndroidManifest.xml updated:"
            cat "$MANIFEST"
          fi

      - name: Build Android APK
        working-directory: frontend
        run: pnpm --filter client tauri android build --apk

      - name: Sign APKs
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | sort -V | tail -n 1)
          mkdir -p signed-apk
          for apk in $(find frontend/client/src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f); do
            filename=$(basename "$apk")
            if [[ "$filename" == *"universal"* ]]; then
              final_name="LoveGirl_${VERSION}_android-universal.apk"
            else
              arch=$(echo "$filename" | sed 's/app-\(.*\)-release.*/\1/')
              final_name="LoveGirl_${VERSION}_android-${arch}.apk"
            fi
            echo "Signing $filename -> $final_name"
            $BUILD_TOOLS/zipalign -v 4 "$apk" "${apk%.apk}-aligned.apk"
            $BUILD_TOOLS/apksigner sign \
              --ks $HOME/lovegirl.keystore \
              --ks-pass pass:${{ secrets.KEYSTORE_PASS }} \
              --ks-key-alias ${{ secrets.KEY_ALIAS }} \
              --key-pass pass:${{ secrets.KEY_PASS }} \
              --out "signed-apk/$final_name" \
              "${apk%.apk}-aligned.apk"
            rm "${apk%.apk}-aligned.apk"
          done

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: signed-apk

  finalize-release:
    needs: [get-version, build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Filter release files
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          echo "Filtering release files for version $VERSION"
          cd artifacts
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.apk" \) | while read file; do
            filename=$(basename "$file")
            if [[ "$filename" != *"$VERSION"* ]]; then
              echo "Removing old version file: $filename"
              rm "$file"
            fi
          done
          echo "Remaining files:"
          find . -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: "LoveGirl v${{ needs.get-version.outputs.version }}"
          body: |
            ## Downloads

            | Platform | Arch | File |
            |----------|------|------|
            | Linux | x86_64 | `.deb`, `.rpm`, `.AppImage` |
            | Windows | x86_64 | `.msi`, `.exe` |
            | macOS | Universal | `.dmg`, `.app` |
            | Android | arm64 | `.apk` |
          draft: false
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}