name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            echo "Tag triggered, version: $VERSION"
          else
            LAST_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$LAST_TAG" ]; then
              BASE_VERSION=${LAST_TAG#v}
              BUILD_NUM=$(git rev-list --count "${LAST_TAG}..HEAD" 2>/dev/null || echo "0")
              BUILD_NUM=$((BUILD_NUM % 65536))
              VERSION="${BASE_VERSION}.${BUILD_NUM}"
              echo "Manual trigger with last semver tag $LAST_TAG, version: $VERSION (commits since tag: $BUILD_NUM)"
            else
              BUILD_NUM=$(git rev-list --count HEAD 2>/dev/null || echo "1")
              BUILD_NUM=$((BUILD_NUM % 65536))
              VERSION="1.0.0.${BUILD_NUM}"
              echo "Manual trigger without tag, version: $VERSION"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-push-image:
    needs: get-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get build info
        id: build-info
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.get-version.outputs.version }}
            COMMIT=${{ steps.build-info.outputs.short_sha }}
            BUILD_TIME=${{ steps.build-info.outputs.build_time }}
          provenance: false
